name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src/web/dashboard/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install dashboard deps
        run: npm ci
        working-directory: src/web/dashboard

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test:dev

      - name: Build
        run: npm run build

      - name: Smoke CLI (host)
        shell: bash
        run: |
          set -e
          echo '--- shadow --version ---'
          node dist/cli.js --version
          echo '--- shadow --help ---'
          node dist/cli.js --help > /dev/null
          echo '--- shadow noexiste (expect non-zero exit) ---'
          if node dist/cli.js noexiste > /dev/null 2>&1; then
            echo 'FAIL: unknown command did not exit non-zero' >&2
            exit 1
          fi
          echo 'OK: unknown command rejected'
