<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--card:#161b22;--border:#30363d;--accent:#bc8cff;
  --text:#e6edf3;--text-dim:#8b949e;--text-muted:#484f58;
  --red:#f85149;--orange:#d29922;--green:#3fb950;--blue:#58a6ff;--purple:#bc8cff;
  --core:#bc8cff;--hot:#f85149;--warm:#d29922;--cool:#58a6ff;--cold:#8b949e;
  --sidebar-w:60px;--topbar-h:48px;
  --radius:8px;--radius-sm:4px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overflow:hidden}

/* ── Sidebar ── */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100%;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;z-index:100;padding-top:8px;gap:2px}
.sidebar .logo{font-size:22px;padding:8px 0 12px;cursor:default;user-select:none}
.sidebar .nav-item{position:relative;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);cursor:pointer;font-size:18px;transition:background .15s,transform .1s;user-select:none}
.sidebar .nav-item:hover{background:var(--border);transform:scale(1.08)}
.sidebar .nav-item.active{background:rgba(188,140,255,.15)}
.sidebar .nav-item.active::before{content:'';position:absolute;left:0;top:25%;height:50%;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.sidebar .nav-item .tooltip{position:absolute;left:calc(var(--sidebar-w) + 4px);top:50%;transform:translateY(-50%);background:#2d333b;color:var(--text);padding:4px 10px;border-radius:var(--radius-sm);font-size:12px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200}
.sidebar .nav-item:hover .tooltip{opacity:1}

/* ── Top bar ── */
.topbar{position:fixed;top:0;left:var(--sidebar-w);right:0;height:var(--topbar-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:90}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-left h1{font-size:16px;font-weight:600;color:var(--accent);letter-spacing:.5px}
.topbar-badge{font-size:13px;background:rgba(188,140,255,.12);color:var(--accent);padding:2px 10px;border-radius:12px;display:flex;align-items:center;gap:4px}
.topbar-right{display:flex;align-items:center;gap:14px;font-size:13px;color:var(--text-dim)}
.topbar-mood{font-size:15px}
.topbar-focus{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(63,185,80,.15);color:var(--green);display:none}
.topbar-focus.on{display:inline-block}
.topbar-timer{font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums}

/* ── Main ── */
.main{position:fixed;top:var(--topbar-h);left:var(--sidebar-w);right:0;bottom:0;overflow-y:auto;padding:24px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Tab content ── */
.tab-content{display:none;animation:fadeIn .25s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Dashboard grid ── */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:border-color .2s}
.metric-card:hover{border-color:var(--accent)}
.metric-label{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:600;color:var(--text)}
.metric-value.accent{color:var(--accent)}
.progress-bar{height:6px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .6s ease}

/* ── Section header ── */
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.section-title{font-size:18px;font-weight:600}

/* ── Filter tabs ── */
.filter-tabs{display:flex;gap:4px;flex-wrap:wrap}
.filter-tab{padding:4px 14px;border-radius:16px;font-size:12px;cursor:pointer;background:var(--border);color:var(--text-dim);border:none;transition:all .15s}
.filter-tab:hover{color:var(--text)}
.filter-tab.active{background:rgba(188,140,255,.15);color:var(--accent)}

/* ── Search ── */
.search-input{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;color:var(--text);font-size:13px;width:100%;max-width:360px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text-muted)}

/* ── Lists ── */
.list-container{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.list-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;transition:border-color .2s;cursor:default}
.list-item:hover{border-color:var(--accent)}
.list-item-header{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.list-item-title{font-weight:500;font-size:14px;flex:1;min-width:0}
.list-item-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.list-item-body{margin-top:8px;font-size:13px;color:var(--text-dim);display:none}
.list-item.expanded .list-item-body{display:block}
.list-item .expand-btn{cursor:pointer;font-size:11px;color:var(--text-muted);background:none;border:none;padding:2px 6px;border-radius:var(--radius-sm);transition:color .15s}
.list-item .expand-btn:hover{color:var(--text)}

/* ── Badges & pills ── */
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-core{background:rgba(188,140,255,.15);color:var(--core)}
.badge-hot{background:rgba(248,81,73,.15);color:var(--hot)}
.badge-warm{background:rgba(210,153,34,.15);color:var(--warm)}
.badge-cool{background:rgba(88,166,255,.15);color:var(--cool)}
.badge-cold{background:rgba(139,148,158,.15);color:var(--cold)}
.badge-kind{background:rgba(188,140,255,.12);color:var(--accent)}
.pill{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.pill-impact{background:rgba(248,81,73,.12);color:var(--red)}
.pill-confidence{background:rgba(63,185,80,.12);color:var(--green)}
.pill-risk{background:rgba(210,153,34,.12);color:var(--orange)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-pending{background:var(--orange)}
.status-accepted{background:var(--green)}
.status-dismissed{background:var(--text-muted)}

/* ── Buttons ── */
.btn{font-size:12px;padding:4px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text-dim);transition:all .15s}
.btn:hover{border-color:var(--text-dim);color:var(--text)}
.btn-accept{border-color:rgba(63,185,80,.4);color:var(--green)}
.btn-accept:hover{background:rgba(63,185,80,.12);border-color:var(--green)}
.btn-dismiss{border-color:rgba(248,81,73,.4);color:var(--red)}
.btn-dismiss:hover{background:rgba(248,81,73,.12);border-color:var(--red)}

/* ── Cards grid ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
.card-name{font-weight:600;font-size:15px;margin-bottom:4px}
.card-detail{font-size:13px;color:var(--text-dim);margin-top:2px}
.card-detail span{color:var(--text)}

/* ── Usage ── */
.usage-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.usage-model{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.usage-model-name{font-weight:600;font-size:13px;margin-bottom:6px;color:var(--accent)}
.usage-stat{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);padding:2px 0}
.usage-stat span{color:var(--text)}

/* ── Heartbeats ── */
.timeline{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.timeline-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:14px;transition:border-color .2s}
.timeline-item:hover{border-color:var(--accent)}
.timeline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.timeline-dot.init{background:var(--blue)}
.timeline-dot.active{background:var(--green)}
.timeline-dot.idle{background:var(--orange)}
.timeline-dot.end{background:var(--red)}
.timeline-info{flex:1}
.timeline-time{font-size:12px;color:var(--text-muted)}
.timeline-detail{font-size:13px;color:var(--text-dim);margin-top:2px}

/* ── Severity colors for observations ── */
.severity-info{color:var(--blue)}
.severity-warn,.severity-warning{color:var(--orange)}
.severity-error,.severity-critical{color:var(--red)}
.severity-low{color:var(--text-dim)}

/* ── Empty state ── */
.empty-state{text-align:center;padding:48px 20px;color:var(--text-muted);font-size:14px}

/* ── Mobile ── */
@media(max-width:768px){
  .sidebar{top:auto;bottom:0;left:0;right:0;width:100%;height:52px;flex-direction:row;justify-content:space-around;padding:0;border-right:none;border-top:1px solid var(--border);overflow-x:auto;gap:0}
  .sidebar .logo{display:none}
  .sidebar .nav-item{width:36px;height:42px;font-size:16px}
  .sidebar .nav-item .tooltip{display:none}
  .sidebar .nav-item.active::before{top:auto;bottom:0;left:25%;right:25%;width:50%;height:3px;border-radius:3px 3px 0 0}
  .topbar{left:0}
  .main{left:0;bottom:52px;padding:16px}
  .metrics-grid,.card-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="logo" title="Shadow">&#127761;</div>
  <div class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')">&#128202;<span class="tooltip">Dashboard</span></div>
  <div class="nav-item" data-tab="memories" onclick="switchTab('memories')">&#129504;<span class="tooltip">Memories</span></div>
  <div class="nav-item" data-tab="suggestions" onclick="switchTab('suggestions')">&#128161;<span class="tooltip">Suggestions</span></div>
  <div class="nav-item" data-tab="observations" onclick="switchTab('observations')">&#128064;<span class="tooltip">Observations</span></div>
  <div class="nav-item" data-tab="repos" onclick="switchTab('repos')">&#128230;<span class="tooltip">Repos</span></div>
  <div class="nav-item" data-tab="team" onclick="switchTab('team')">&#128101;<span class="tooltip">Team</span></div>
  <div class="nav-item" data-tab="systems" onclick="switchTab('systems')">&#128295;<span class="tooltip">Systems</span></div>
  <div class="nav-item" data-tab="usage" onclick="switchTab('usage')">&#128200;<span class="tooltip">Usage</span></div>
  <div class="nav-item" data-tab="heartbeats" onclick="switchTab('heartbeats')">&hearts;<span class="tooltip">Heartbeats</span></div>
</nav>

<!-- Top bar -->
<header class="topbar">
  <div class="topbar-left">
    <h1>Shadow</h1>
    <span class="topbar-badge" id="trustBadge"></span>
    <span class="topbar-mood" id="moodDisplay"></span>
    <span class="topbar-focus" id="focusIndicator">FOCUS</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-timer" id="refreshTimer">30s</span>
  </div>
</header>

<!-- Main -->
<main class="main">

  <!-- Dashboard -->
  <div class="tab-content active" id="tab-dashboard">
    <div class="metrics-grid" id="metricsGrid"></div>
  </div>

  <!-- Memories -->
  <div class="tab-content" id="tab-memories">
    <div class="section-header">
      <span class="section-title">Memories</span>
      <div class="filter-tabs" id="memoryFilters">
        <button class="filter-tab active" data-layer="" onclick="filterMemories('')">All</button>
        <button class="filter-tab" data-layer="core" onclick="filterMemories('core')">Core</button>
        <button class="filter-tab" data-layer="hot" onclick="filterMemories('hot')">Hot</button>
        <button class="filter-tab" data-layer="warm" onclick="filterMemories('warm')">Warm</button>
        <button class="filter-tab" data-layer="cool" onclick="filterMemories('cool')">Cool</button>
        <button class="filter-tab" data-layer="cold" onclick="filterMemories('cold')">Cold</button>
      </div>
    </div>
    <input class="search-input" id="memorySearch" type="text" placeholder="Search memories..." oninput="debounceMemorySearch()">
    <div class="list-container" id="memoriesList"></div>
  </div>

  <!-- Suggestions -->
  <div class="tab-content" id="tab-suggestions">
    <div class="section-header">
      <span class="section-title">Suggestions</span>
      <div class="filter-tabs" id="suggestionFilters">
        <button class="filter-tab active" data-status="" onclick="filterSuggestions('')">All</button>
        <button class="filter-tab" data-status="pending" onclick="filterSuggestions('pending')">Pending</button>
        <button class="filter-tab" data-status="accepted" onclick="filterSuggestions('accepted')">Accepted</button>
        <button class="filter-tab" data-status="dismissed" onclick="filterSuggestions('dismissed')">Dismissed</button>
      </div>
    </div>
    <div class="list-container" id="suggestionsList"></div>
  </div>

  <!-- Observations -->
  <div class="tab-content" id="tab-observations">
    <div class="section-header">
      <span class="section-title">Observations</span>
    </div>
    <div class="list-container" id="observationsList"></div>
  </div>

  <!-- Repos -->
  <div class="tab-content" id="tab-repos">
    <div class="section-header">
      <span class="section-title">Repos</span>
    </div>
    <div class="card-grid" id="reposGrid"></div>
  </div>

  <!-- Team -->
  <div class="tab-content" id="tab-team">
    <div class="section-header">
      <span class="section-title">Team</span>
    </div>
    <div class="card-grid" id="teamGrid"></div>
  </div>

  <!-- Systems -->
  <div class="tab-content" id="tab-systems">
    <div class="section-header">
      <span class="section-title">Systems</span>
    </div>
    <div class="card-grid" id="systemsGrid"></div>
  </div>

  <!-- Usage -->
  <div class="tab-content" id="tab-usage">
    <div class="section-header">
      <span class="section-title">Usage</span>
      <div class="filter-tabs" id="usageFilters">
        <button class="filter-tab active" data-period="day" onclick="filterUsage('day')">Day</button>
        <button class="filter-tab" data-period="week" onclick="filterUsage('week')">Week</button>
        <button class="filter-tab" data-period="month" onclick="filterUsage('month')">Month</button>
      </div>
    </div>
    <div class="usage-summary" id="usageSummary"></div>
    <div id="usageBreakdown"></div>
  </div>

  <!-- Heartbeats -->
  <div class="tab-content" id="tab-heartbeats">
    <div class="section-header">
      <span class="section-title">Heartbeats</span>
    </div>
    <div class="timeline" id="heartbeatTimeline"></div>
  </div>

</main>

<script>
/* ──────────────────────────── State ──────────────────────────── */
let currentTab = 'dashboard';
let memoryLayer = '';
let memoryQuery = '';
let suggestionStatus = '';
let usagePeriod = 'day';
let refreshCountdown = 30;
let refreshInterval = null;
let searchTimeout = null;

const TRUST_BADGES = {
  1: '\uD83D\uDD0D observer',
  2: '\uD83D\uDCAC advisor',
  3: '\uD83E\uDD1D assistant',
  4: '\u26A1\uFE0F partner',
  5: '\uD83D\uDC7E shadow'
};

/* ──────────────────────────── API ──────────────────────────── */
async function api(path, opts) {
  try {
    const r = await fetch(path, opts);
    if (!r.ok) throw new Error(r.statusText);
    return await r.json();
  } catch (e) {
    console.error('API error:', path, e);
    return null;
  }
}

/* ──────────────────────────── Navigation ──────────────────────────── */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(function(n) {
    n.classList.toggle('active', n.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-content').forEach(function(t) {
    t.classList.toggle('active', t.id === 'tab-' + tab);
  });
  loadTabData(tab);
}

/* ──────────────────────────── Escaping ──────────────────────────── */
function esc(s) {
  if (s == null) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

/* ──────────────────────────── Loaders ──────────────────────────── */
async function loadTabData(tab) {
  switch (tab) {
    case 'dashboard': return loadDashboard();
    case 'memories': return loadMemories();
    case 'suggestions': return loadSuggestions();
    case 'observations': return loadObservations();
    case 'repos': return loadRepos();
    case 'team': return loadTeam();
    case 'systems': return loadSystems();
    case 'usage': return loadUsage();
    case 'heartbeats': return loadHeartbeats();
  }
}

/* ── Dashboard ── */
async function loadDashboard() {
  var data = await api('/api/status');
  if (!data) {
    document.getElementById('metricsGrid').innerHTML = '<div class="empty-state">Unable to load status</div>';
    return;
  }

  var trust = data.trust_level != null ? data.trust_level : (data.trustLevel != null ? data.trustLevel : 0);
  var trustPct = Math.round((trust / 5) * 100);
  var badge = TRUST_BADGES[trust] || ('Level ' + trust);
  var mood = data.mood || '';
  var focus = data.focus_mode != null ? data.focus_mode : (data.focusMode != null ? data.focusMode : false);

  document.getElementById('trustBadge').textContent = badge;
  document.getElementById('moodDisplay').textContent = mood;
  var fi = document.getElementById('focusIndicator');
  fi.classList.toggle('on', !!focus);

  var metrics = [
    { label: 'Trust Level', value: trust + '/5', accent: true, bar: trustPct },
    { label: 'Personality', value: esc(data.personality || data.personality_name || '-') },
    { label: 'Proactivity', value: esc(data.proactivity != null ? data.proactivity : '-') },
    { label: 'Repos', value: data.repos_count != null ? data.repos_count : (data.reposCount != null ? data.reposCount : '-') },
    { label: 'Memories', value: data.memories_count != null ? data.memories_count : (data.memoriesCount != null ? data.memoriesCount : '-') },
    { label: 'Suggestions', value: data.suggestions_count != null ? data.suggestions_count : (data.suggestionsCount != null ? data.suggestionsCount : (data.pending_suggestions != null ? data.pending_suggestions : '-')) },
    { label: 'Pending Events', value: data.events_count != null ? data.events_count : (data.eventsCount != null ? data.eventsCount : (data.pending_events != null ? data.pending_events : '-')) },
    { label: "Today's Tokens", value: formatNumber(data.today_tokens != null ? data.today_tokens : (data.todayTokens != null ? data.todayTokens : 0)) },
    { label: 'Mood', value: mood || '-' }
  ];

  document.getElementById('metricsGrid').innerHTML = metrics.map(function(m) {
    return '<div class="metric-card">' +
      '<div class="metric-label">' + esc(m.label) + '</div>' +
      '<div class="metric-value' + (m.accent ? ' accent' : '') + '">' + esc(String(m.value)) + '</div>' +
      (m.bar != null ? '<div class="progress-bar"><div class="progress-bar-fill" style="width:' + m.bar + '%"></div></div>' : '') +
    '</div>';
  }).join('');
}

/* ── Memories ── */
async function loadMemories() {
  var params = new URLSearchParams();
  if (memoryLayer) params.set('layer', memoryLayer);
  if (memoryQuery) params.set('q', memoryQuery);
  var data = await api('/api/memories?' + params.toString());
  var list = Array.isArray(data) ? data : (data ? (data.memories || data.items || []) : []);
  var el = document.getElementById('memoriesList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state">No memories found</div>';
    return;
  }
  el.innerHTML = list.map(function(m) {
    var layer = (m.layer || 'cool').toLowerCase();
    return '<div class="list-item" onclick="this.classList.toggle(\'expanded\')">' +
      '<div class="list-item-header">' +
        '<span class="badge badge-' + layer + '">' + esc(layer) + '</span>' +
        '<span class="list-item-title">' + esc(m.key || m.title || m.id) + '</span>' +
        '<button class="expand-btn">&#9662;</button>' +
      '</div>' +
      '<div class="list-item-body">' + esc(m.value || m.content || m.summary || '') + '</div>' +
    '</div>';
  }).join('');
}

function filterMemories(layer) {
  memoryLayer = layer;
  document.querySelectorAll('#memoryFilters .filter-tab').forEach(function(t) {
    t.classList.toggle('active', (t.dataset.layer || '') === layer);
  });
  loadMemories();
}

function debounceMemorySearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(function() {
    memoryQuery = document.getElementById('memorySearch').value.trim();
    loadMemories();
  }, 300);
}

/* ── Suggestions ── */
async function loadSuggestions() {
  var params = new URLSearchParams();
  if (suggestionStatus) params.set('status', suggestionStatus);
  var data = await api('/api/suggestions?' + params.toString());
  var list = Array.isArray(data) ? data : (data ? (data.suggestions || data.items || []) : []);
  var el = document.getElementById('suggestionsList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state">No suggestions</div>';
    return;
  }
  el.innerHTML = list.map(function(s) {
    var status = (s.status || 'pending').toLowerCase();
    var id = s.id || s.suggestion_id;
    var html = '<div class="list-item">' +
      '<div class="list-item-header">' +
        '<span class="status-dot status-' + status + '"></span>' +
        '<span class="list-item-title">' + esc(s.title || s.suggestion || s.text) + '</span>' +
        '<div class="list-item-meta">' +
          (s.impact != null ? '<span class="pill pill-impact">impact ' + esc(s.impact) + '</span>' : '') +
          (s.confidence != null ? '<span class="pill pill-confidence">conf ' + esc(s.confidence) + '</span>' : '') +
          (s.risk != null ? '<span class="pill pill-risk">risk ' + esc(s.risk) + '</span>' : '') +
        '</div>' +
      '</div>';
    var desc = s.description || s.detail || s.body;
    if (desc) {
      html += '<div class="list-item-body" style="display:block;margin-top:6px">' + esc(desc) + '</div>';
    }
    if (status === 'pending') {
      html += '<div style="margin-top:10px;display:flex;gap:8px">' +
        '<button class="btn btn-accept" onclick="actSuggestion(\'' + id + '\',\'accept\',event)">Accept</button>' +
        '<button class="btn btn-dismiss" onclick="actSuggestion(\'' + id + '\',\'dismiss\',event)">Dismiss</button>' +
      '</div>';
    }
    html += '</div>';
    return html;
  }).join('');
}

async function actSuggestion(id, action, e) {
  e.stopPropagation();
  await api('/api/suggestions/' + id + '/' + action, { method: 'POST' });
  loadSuggestions();
}

function filterSuggestions(status) {
  suggestionStatus = status;
  document.querySelectorAll('#suggestionFilters .filter-tab').forEach(function(t) {
    t.classList.toggle('active', (t.dataset.status || '') === status);
  });
  loadSuggestions();
}

/* ── Observations ── */
async function loadObservations() {
  var data = await api('/api/observations?limit=20');
  var list = Array.isArray(data) ? data : (data ? (data.observations || data.items || []) : []);
  var el = document.getElementById('observationsList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state">No observations yet</div>';
    return;
  }
  el.innerHTML = list.map(function(o) {
    var sev = (o.severity || o.level || 'info').toLowerCase();
    var kind = o.kind || o.type || 'general';
    var title = o.title || o.observation || o.text || o.summary;
    var rawDetail = o.detail || o.description || o.body;
    var time = o.created_at || o.timestamp;
    var html = '<div class="list-item">' +
      '<div class="list-item-header">' +
        '<span class="badge badge-kind">' + esc(kind) + '</span>' +
        '<span class="list-item-title severity-' + sev + '">👀 ' + esc(title) + '</span>' +
        '<span class="badge severity-' + sev + '" style="font-size:10px">' + esc(sev) + '</span>' +
      '</div>';
    if (rawDetail && typeof rawDetail === 'object') {
      var detailHtml = '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px 16px">';
      Object.keys(rawDetail).forEach(function(k) {
        var v = rawDetail[k];
        if (typeof v === 'string' && v.match(/^\d{4}-\d{2}-\d{2}/)) v = formatTime(v);
        detailHtml += '<span style="font-size:12px;color:var(--text-dim)">' + esc(k) + ': <span style="color:var(--text)">' + esc(String(v)) + '</span></span>';
      });
      detailHtml += '</div>';
      html += detailHtml;
    } else if (rawDetail) {
      html += '<div class="list-item-body" style="display:block;margin-top:4px">' + esc(String(rawDetail)) + '</div>';
    }
    if (time) {
      html += '<div style="font-size:11px;color:var(--text-muted);margin-top:4px">' + formatTime(time) + '</div>';
    }
    html += '</div>';
    return html;
  }).join('');
}

/* ── Usage ── */
async function loadUsage() {
  var data = await api('/api/usage?period=' + usagePeriod);
  if (!data) {
    document.getElementById('usageSummary').innerHTML = '<div class="empty-state">No usage data</div>';
    document.getElementById('usageBreakdown').innerHTML = '';
    return;
  }

  var totalInput = data.total_input_tokens != null ? data.total_input_tokens : (data.totalInputTokens != null ? data.totalInputTokens : (data.input_tokens != null ? data.input_tokens : 0));
  var totalOutput = data.total_output_tokens != null ? data.total_output_tokens : (data.totalOutputTokens != null ? data.totalOutputTokens : (data.output_tokens != null ? data.output_tokens : 0));
  var totalCalls = data.total_calls != null ? data.total_calls : (data.totalCalls != null ? data.totalCalls : (data.calls != null ? data.calls : 0));

  document.getElementById('usageSummary').innerHTML =
    '<div class="metric-card"><div class="metric-label">Input Tokens</div><div class="metric-value">' + formatNumber(totalInput) + '</div></div>' +
    '<div class="metric-card"><div class="metric-label">Output Tokens</div><div class="metric-value">' + formatNumber(totalOutput) + '</div></div>' +
    '<div class="metric-card"><div class="metric-label">API Calls</div><div class="metric-value">' + formatNumber(totalCalls) + '</div></div>';

  var models = data.models || data.by_model || data.breakdown || [];
  var modelList = Array.isArray(models) ? models : Object.entries(models).map(function(entry) {
    var obj = Object.assign({ model: entry[0] }, entry[1]);
    return obj;
  });
  var bd = document.getElementById('usageBreakdown');
  if (!modelList.length) {
    bd.innerHTML = '';
    return;
  }
  bd.innerHTML = '<h3 style="font-size:14px;color:var(--text-dim);margin-bottom:10px">Per-Model Breakdown</h3>' +
    '<div class="card-grid">' + modelList.map(function(m) {
      var inp = m.input_tokens != null ? m.input_tokens : (m.inputTokens != null ? m.inputTokens : 0);
      var out = m.output_tokens != null ? m.output_tokens : (m.outputTokens != null ? m.outputTokens : 0);
      var calls = m.calls != null ? m.calls : (m.count != null ? m.count : 0);
      return '<div class="usage-model">' +
        '<div class="usage-model-name">' + esc(m.model || m.name) + '</div>' +
        '<div class="usage-stat">Input <span>' + formatNumber(inp) + '</span></div>' +
        '<div class="usage-stat">Output <span>' + formatNumber(out) + '</span></div>' +
        '<div class="usage-stat">Calls <span>' + formatNumber(calls) + '</span></div>' +
      '</div>';
    }).join('') + '</div>';
}

function filterUsage(period) {
  usagePeriod = period;
  document.querySelectorAll('#usageFilters .filter-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.period === period);
  });
  loadUsage();
}

/* ── Heartbeats ── */
async function loadHeartbeats() {
  var data = await api('/api/heartbeats');
  var list = Array.isArray(data) ? data : (data ? (data.heartbeats || data.items || []) : []);
  var el = document.getElementById('heartbeatTimeline');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state">No heartbeats recorded</div>';
    return;
  }
  el.innerHTML = list.map(function(h) {
    var phase = (h.phase || h.type || 'active').toLowerCase();
    var dotClass = (phase === 'init' || phase === 'start') ? 'init' : (phase === 'end' ? 'end' : (phase === 'idle' ? 'idle' : 'active'));
    var time = h.created_at || h.timestamp || h.started_at;
    var html = '<div class="timeline-item">' +
      '<div class="timeline-dot ' + dotClass + '"></div>' +
      '<div class="timeline-info">' +
        '<div style="font-weight:500">' + esc(phase) + '</div>';
    if (h.duration != null) {
      html += '<div class="timeline-detail">Duration: ' + esc(h.duration) + (typeof h.duration === 'number' ? 's' : '') + '</div>';
    }
    var tc = h.tool_calls != null ? h.tool_calls : (h.toolCalls != null ? h.toolCalls : null);
    if (tc != null) {
      html += '<div class="timeline-detail">Tool calls: ' + esc(tc) + '</div>';
    }
    var tokens = h.input_tokens != null ? h.input_tokens : (h.tokens != null ? h.tokens : null);
    if (tokens != null) {
      html += '<div class="timeline-detail">Tokens: ' + formatNumber(tokens) + '</div>';
    }
    html += '</div>' +
      '<div class="timeline-time">' + formatTime(time) + '</div>' +
    '</div>';
    return html;
  }).join('');
}

/* ──────────────────────────── Helpers ──────────────────────────── */
function formatNumber(n) {
  if (n == null) return '-';
  n = Number(n);
  if (isNaN(n)) return '-';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function formatTime(t) {
  if (!t) return '';
  try {
    var d = new Date(t);
    if (isNaN(d.getTime())) return String(t);
    var now = new Date();
    var diff = now - d;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    return String(t);
  }
}

/* ──────────────────────────── Auto Refresh ──────────────────────────── */
function startRefreshTimer() {
  refreshCountdown = 30;
  clearInterval(refreshInterval);
  refreshInterval = setInterval(function() {
    refreshCountdown--;
    document.getElementById('refreshTimer').textContent = refreshCountdown + 's';
    if (refreshCountdown <= 0) {
      refreshCountdown = 30;
      loadTabData(currentTab);
    }
  }, 1000);
}

/* ──────────────────────────── Init ──────────────────────────── */
document.addEventListener('DOMContentLoaded', function() {
  loadDashboard();
  startRefreshTimer();
});
